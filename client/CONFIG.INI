# ============================================
# 设备信息采集器 - 客户端配置文件
# ============================================
# 请根据实际情况修改以下配置
# 修改后重启客户端即可生效

[Server]
# 服务器地址（必填）
# 局域网部署时，请改为服务端的实际IP地址
# 例如：http://192.168.1.100:5000
ServerUrl = http://localhost:5000

[Account]
# 登录账号（必填）
# 由管理员分配的用户名
Username = 

# 登录密码（必填）
# 由管理员分配的密码
Password = 
